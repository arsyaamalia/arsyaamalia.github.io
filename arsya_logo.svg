<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="-120 -140 240 280">
  <defs>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="gLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Left leg of A -->
  <line x1="-72" y1="110" x2="0" y2="-100" stroke="url(#gBlue)" stroke-width="10" stroke-linecap="round"/>
  <!-- Right leg of A -->
  <line x1="72" y1="110" x2="0" y2="-100" stroke="url(#gBlue)" stroke-width="10" stroke-linecap="round"/>

  <!-- Crossbar replaced by sparkline -->
  <polyline
    points="-46,24 -30,8 -16,30 -2,4 12,20 28,2 46,24"
    fill="none"
    stroke="url(#gLine)"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Data nodes on sparkline -->
  <circle cx="-46" cy="24" r="3.5" fill="#2563EB"/>
  <circle cx="-30" cy="8"  r="3"   fill="#2563EB"/>
  <circle cx="-16" cy="30" r="3"   fill="#2563EB"/>
  <circle cx="-2"  cy="4"  r="4"   fill="url(#gBlue)"/>
  <circle cx="12"  cy="20" r="3"   fill="#059669"/>
  <circle cx="28"  cy="2"  r="3"   fill="#059669"/>
  <circle cx="46"  cy="24" r="3.5" fill="#059669"/>

  <!-- Apex dot -->
  <circle cx="0" cy="-100" r="5" fill="url(#gBlue)"/>

  <!-- Foot dots -->
  <circle cx="-72" cy="110" r="4" fill="#2563EB" opacity="0.5"/>
  <circle cx="72"  cy="110" r="4" fill="#059669" opacity="0.5"/>
</svg>
